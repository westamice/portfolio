<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uesta Mice — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1714;
      --rust: #b84a2e;
      --cream: #f4f0e8;
    }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      gap: 1rem;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: var(--cream);
      white-space: nowrap;
    }
    .brand span { color: var(--rust); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--cream);
      background: transparent;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--rust); border-color: var(--rust); }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .btn-primary { background: var(--rust); border-color: var(--rust); }
    .btn-primary:hover { background: #d4613e; border-color: #d4613e; }

    .viewer {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    embed {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">Uesta <span>Mice</span></div>
</div>

<div class="viewer">
  <embed
    src="https://madtechstudio.com/wmppdf/uesta-mice.pdf"
    type="application/pdf"
    width="100%"
    height="100%"
  />
</div>

</body>
</html>
